services:
  - type: web
    name: esports-line-move-bot
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: TG_TOKEN
        sync: false
      - key: ODDS_API_KEY
        sync: false
      - key: BOOKMAKERS
        value: SingBet,Pinnacle,1xBet
      - key: SPORTS
        value: ""
      - key: DROP_PCT
        value: "4.5"
      - key: MIN_BOOKS_FOR_SIGNAL
        value: "2"
      - key: CHECK_INTERVAL_SEC
        value: "60"
      - key: ALERT_COOLDOWN_MIN
        value: "15"
      - key: EVENT_LIMIT
        value: "8"
      - key: INCLUDE_LIVE
        value: "true"
      - key: ADMIN_CHAT_IDS
        value: ""
